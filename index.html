<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: sans-serif; padding: 40px; font-size: 20px; background: #f0f0f0; }
.val { background: white; padding: 20px; margin: 10px 0; border-radius: 10px; font-size: 24px; font-weight: bold; }
</style>
</head>
<body>
<h2>Dimensions iPad</h2>
<div class="val" id="iw"></div>
<div class="val" id="ih"></div>
<div class="val" id="sw"></div>
<div class="val" id="sh"></div>
<div class="val" id="mq1"></div>
<div class="val" id="mq2"></div>
<div class="val" id="mq3"></div>
<div class="val" id="touch"></div>
<script>
document.getElementById('iw').textContent = 'innerWidth: ' + window.innerWidth;
document.getElementById('ih').textContent = 'innerHeight: ' + window.innerHeight;
document.getElementById('sw').textContent = 'screen.width: ' + window.screen.width;
document.getElementById('sh').textContent = 'screen.height: ' + window.screen.height;
document.getElementById('mq1').textContent = '(min-width:900px max-width:1024px landscape): ' + window.matchMedia('(min-width:900px) and (max-width:1024px) and (orientation:landscape)').matches;
document.getElementById('mq2').textContent = '(min-width:1025px max-width:1400px landscape): ' + window.matchMedia('(min-width:1025px) and (max-width:1400px) and (orientation:landscape)').matches;
document.getElementById('mq3').textContent = '(min-width:1025px landscape pointer:fine): ' + window.matchMedia('(min-width:1025px) and (orientation:landscape) and (pointer:fine)').matches;
document.getElementById('touch').textContent = 'maxTouchPoints: ' + navigator.maxTouchPoints;
</script>
</body>
</html>
