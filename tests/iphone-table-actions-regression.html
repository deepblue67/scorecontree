<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Actions TABLE responsive ScoreContrée</title>
</head>
<body>
<div id="result">Tests en attente</div>
<script>
  const result = document.getElementById('result');
  const failures = [];
  let checks = 0;

  const check = (condition, message) => {
    checks += 1;
    if(!condition) failures.push(message);
  };

  const contexts = [
    {name:'iPhone portrait', width:390, height:844, iphone:true},
    {name:'iPhone paysage', width:844, height:390, iphone:true},
    {name:'iPad portrait', width:768, height:1024, iphone:false},
    {name:'iPad paysage', width:1180, height:820, iphone:false},
    {name:'PC', width:1440, height:900, iphone:false}
  ];

  Promise.all(contexts.map(context => new Promise(resolve => {
    const frame = document.createElement('iframe');
    frame.src = '../index.html';
    frame.style.cssText = `position:absolute;left:-5000px;top:0;width:${context.width}px;height:${context.height}px;border:0;`;
    frame.addEventListener('load', () => resolve({context, frame}));
    document.body.appendChild(frame);
  }))).then(entries => {
    entries.forEach(({context, frame}) => {
      const app = frame.contentWindow;
      const doc = frame.contentDocument;
      app.eval(`
        S.t1 = {name:'Cynthia & Eric',players:['Cynthia','Eric']};
        S.t2 = {name:'Christophe & Daniel',players:['Christophe','Daniel']};
        S.pos = {nord:'Cynthia',sud:'Eric',est:'Christophe',ouest:'Daniel'};
        S.score = {t1:0,t2:0};
        S.history = [];
        S.contract = null;
        S.manche = 1;
        showScreen('game');
        initGameUI();
        showTab('enjeu');
      `);

      const undo = doc.getElementById('btn-undo-last-round');
      const end = doc.getElementById('btn-end-game-table');
      const contract = doc.getElementById('btn-action-contrat');
      const score = doc.getElementById('btn-action-saisie');
      const undoStyle = app.getComputedStyle(undo);

      check(!!undo && !!end, context.name + ' : boutons secondaires absents');
      if(context.iphone) {
        check(undoStyle.display !== 'none', context.name + ' : annulation masquée sans historique');
        check(undo.disabled, context.name + ' : annulation active sans historique');
        check(app.getComputedStyle(contract).gridColumnStart === '1' && app.getComputedStyle(contract).gridRowStart === '1', context.name + ' : Contrat mal placé');
        check(app.getComputedStyle(score).gridColumnStart === '2' && app.getComputedStyle(score).gridRowStart === '1', context.name + ' : Saisir score mal placé');
        check(undoStyle.gridColumnStart === '1' && undoStyle.gridRowStart === '2', context.name + ' : Annuler mal placé');
        check(app.getComputedStyle(end).gridColumnStart === '2' && app.getComputedStyle(end).gridRowStart === '2', context.name + ' : Terminer mal placé');

        app.eval(`S.history = [{manche:1,total1:80,total2:90}]; updatePulseButtons();`);
        check(!undo.disabled, context.name + ' : annulation non activée avec historique');
      } else {
        check(undoStyle.display === 'none', context.name + ' : comportement non-iPhone modifié sans historique');
      }

      app.showTab('contrat');
      const preneurLine = doc.querySelector('#btn-preneur-t2 .team-name-line');
      const preneurLeftFirst = doc.querySelector('#btn-preneur-t1 .team-name-line-1');
      const preneurLeftSecond = doc.querySelector('#btn-preneur-t1 .team-name-line-2');
      const quickGrid = doc.getElementById('quick-btns');
      const quickItems = Array.from(doc.querySelectorAll('#quick-btns span'));
      if(context.name === 'iPhone portrait') {
        check(app.getComputedStyle(preneurLine).display === 'block', 'iPhone portrait : equipe preneuse pas forcee sur deux lignes');
        check(app.getComputedStyle(doc.getElementById('btn-preneur-t1')).flexDirection === 'column', 'iPhone portrait : bouton preneur pas empile en colonne');
        check(preneurLeftFirst?.textContent.trim() === 'Cynthia &' && preneurLeftSecond?.textContent.trim() === 'Eric', 'iPhone portrait : format Nom1 & / Nom2 incorrect');
        check(doc.querySelector('#btn-preneur-t2 .team-name-line-1')?.textContent.trim() === 'Christophe &', 'iPhone portrait : & non attache au premier nom long');
        const spanRect = (span, start, end) => {
          const node = span.firstChild;
          const range = doc.createRange();
          range.setStart(node, start);
          range.setEnd(node, end);
          return range.getBoundingClientRect();
        };
        const firstSpanAmpStart = preneurLeftFirst.textContent.indexOf('&');
        check(
          Math.round(spanRect(preneurLeftFirst, 0, 'Cynthia'.length).top) === Math.round(spanRect(preneurLeftFirst, firstSpanAmpStart, firstSpanAmpStart + 1).top),
          'iPhone portrait : & coupe dans le span Cynthia'
        );
        const textRect = (button, start, end) => {
          const node = Array.from(button.childNodes).find(child => child.nodeType === 3);
          const range = doc.createRange();
          range.setStart(node, start);
          range.setEnd(node, end);
          return range.getBoundingClientRect();
        };
        const leftPlain = doc.getElementById('btn-preneur-t1');
        const rightPlain = doc.getElementById('btn-preneur-t2');
        leftPlain.textContent = 'Cynthia & Eric';
        rightPlain.textContent = 'Christophe & Daniel';
        const leftAmpEnd = leftPlain.textContent.indexOf('&') + 1;
        const leftAmpStart = leftPlain.textContent.indexOf('&');
        const leftSecondStart = leftPlain.textContent.indexOf('Eric');
        const rightAmpEnd = rightPlain.textContent.indexOf('&') + 1;
        const rightAmpStart = rightPlain.textContent.indexOf('&');
        const rightSecondStart = rightPlain.textContent.indexOf('Daniel');
        const leftFirstTop = Math.round(textRect(leftPlain, 0, 'Cynthia'.length).top);
        const leftAmpTop = Math.round(textRect(leftPlain, leftAmpStart, leftAmpEnd).top);
        const leftSecondTop = Math.round(textRect(leftPlain, leftSecondStart, leftPlain.textContent.length).top);
        const rightFirstTop = Math.round(textRect(rightPlain, 0, 'Christophe'.length).top);
        const rightAmpTop = Math.round(textRect(rightPlain, rightAmpStart, rightAmpEnd).top);
        const rightSecondTop = Math.round(textRect(rightPlain, rightSecondStart, rightPlain.textContent.length).top);
        check(leftFirstTop === leftAmpTop && leftAmpTop < leftSecondTop, 'iPhone portrait : texte brut Cynthia & / Eric incorrect');
        check(rightFirstTop === rightAmpTop && rightAmpTop < rightSecondTop, 'iPhone portrait : texte brut Christophe & / Daniel incorrect');
        check(quickItems.length === 10, 'iPhone portrait : nombre de boutons contrat inattendu');
        const firstLineTop = Math.round(quickItems[0].getBoundingClientRect().top);
        const secondLineTop = Math.round(quickItems[5].getBoundingClientRect().top);
        check(quickItems.slice(0, 5).every(item => Math.round(item.getBoundingClientRect().top) === firstLineTop), 'iPhone portrait : premiere ligne contrat pas a 5 boutons');
        check(quickItems.slice(5).every(item => Math.round(item.getBoundingClientRect().top) === secondLineTop) && secondLineTop > firstLineTop, 'iPhone portrait : seconde ligne contrat pas a 5 boutons');
        const firstQuickWidth = Math.round(quickItems[0].getBoundingClientRect().width);
        check(quickItems.every(item => Math.abs(Math.round(item.getBoundingClientRect().width) - firstQuickWidth) <= 2), 'iPhone portrait : boutons contrat pas de meme largeur');
        app.initGameUI();
        app.showTab('contrat');
      } else {
        check(!preneurLine, context.name + ' : equipe preneuse decoupee hors cible');
      }

      app.eval(`
        S.history = [{
          manche:1,contract:'110 ♥',contre:'none',preneur:'Nord & Sud',
          chute:false,pts1:110,pts2:72,total1:110,total2:72
        }];
        openEdit(1);
      `);
      const editInput = doc.getElementById('edit-pts-t1');
      const editButton = doc.querySelector('#edit-scores-grid .stepper button');
      const editStyle = app.getComputedStyle(editInput);
      if(context.name === 'iPhone portrait') {
        check(editStyle.fontSize === '28px', 'iPhone portrait : taille des chiffres édition incorrecte');
        check(parseFloat(editStyle.paddingLeft) <= 2 && parseFloat(editStyle.paddingRight) <= 2, 'iPhone portrait : padding masque encore les chiffres');
        check(parseFloat(app.getComputedStyle(editButton).width) === 44, 'iPhone portrait : largeur bouton édition incorrecte');
        check(editInput.clientWidth >= 55, 'iPhone portrait : champ score encore trop étroit');
        check(app.getComputedStyle(doc.querySelector('#edit-lbl-t2 .team-name-line')).display === 'block', 'iPhone portrait : noms edition pas sur deux lignes');
        const editSteppers = doc.querySelectorAll('#edit-scores-grid .stepper');
        check(Math.abs(editSteppers[0].getBoundingClientRect().top - editSteppers[1].getBoundingClientRect().top) <= 1, 'iPhone portrait : steppers edition non alignes');
      } else {
        check(editStyle.fontSize === '36px', context.name + ' : style édition modifié hors iPhone portrait');
        check(!doc.querySelector('#edit-lbl-t2 .team-name-line'), context.name + ' : noms edition decoupes hors iPhone portrait');
      }
      app.closeEdit();

      app.eval(`
        S.contract = {
          team:'t1',
          value:110,
          suit:'♥',
          suitCode:'h',
          contre:'none',
          preneur:S.t1.name
        };
        showTab('saisie');
        updateSaisieForm();
      `);
      const saisie = doc.getElementById('tab-saisie');
      const saisieStyle = app.getComputedStyle(saisie);
      const fineButton = doc.querySelector('#tab-saisie button[onclick*="stepScoreFine"]');
      const exactLabel = fineButton?.nextElementSibling;
      const quickButton = doc.querySelector('#tab-saisie span[onclick*="setQuickScore"]');
      const beloteInput = doc.getElementById('chk-bel-t1');
      if(context.name === 'iPhone portrait') {
        check(app.getComputedStyle(fineButton).fontSize === '12px', 'iPhone portrait : boutons point exact pas reduits');
        check(app.getComputedStyle(exactLabel).display === 'none', 'iPhone portrait : libelle point exact encore visible');
        check(parseFloat(app.getComputedStyle(beloteInput).width) === 18, 'iPhone portrait : case belote non reduite');
        app.eval(`
          S.score = {t1:230,t2:310};
          S.contract = {team:'t1',preneurTeam:'t1',value:110,isCapot:false,suit:'♥',suitCode:'h',contre:'none',preneur:S.t1.name};
          showMancheEnCours();
        `);
        const mecScoreBox = doc.getElementById('mec-st1');
        const mecNameRect = doc.getElementById('mec-n1').getBoundingClientRect();
        const mecScoreRect = doc.getElementById('mec-s1').getBoundingClientRect();
        check(app.getComputedStyle(mecScoreBox).flexDirection === 'column', 'iPhone portrait : scores manche en cours pas en dessous au premier affichage');
        check(mecScoreRect.top >= mecNameRect.bottom, 'iPhone portrait : score manche en cours encore a droite du nom');
      }
      if(context.name === 'iPhone paysage') {
        check(saisieStyle.overflowY === 'auto' || saisieStyle.overflowY === 'scroll', 'iPhone paysage : saisie score non scrollable');
        check(saisieStyle.transform === 'none', 'iPhone paysage : transform bloque encore le scroll saisie');
        check(parseFloat(saisieStyle.paddingBottom) >= 80, 'iPhone paysage : marge basse saisie insuffisante');
        check(app.getComputedStyle(fineButton).fontSize === '13px', 'iPhone paysage : boutons point exact pas reduits');
        check(app.getComputedStyle(quickButton).fontSize === '13px', 'iPhone paysage : boutons rapides score pas agrandis');
        const before = saisie.scrollTop;
        saisie.scrollTop = 120;
        check(saisie.scrollTop > before, 'iPhone paysage : scrollTop saisie ne bouge pas');
      }
    });

    result.textContent = failures.length ? 'FAIL ' + failures.join(' | ') : 'PASS ' + checks;
    result.dataset.status = failures.length ? 'fail' : 'pass';
  }).catch(error => {
    result.textContent = 'ERROR ' + error.message;
    result.dataset.status = 'error';
  });
</script>
</body>
</html>
